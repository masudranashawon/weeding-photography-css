<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Weddings</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-wrapper">
                <div class="logo">
                    <h5>Aura<span>Weddings</span> </h5>
                </div>

                <nav>
                    <ul>
                        <li><a href="#portfolio">Portfolio</a></li>
                        <li><a href="#services">Services</a></li>
                        <li><a href="#about">About</a></li>
                        <li><a href="#contact">Contact</a></li>
                    </ul>
                </nav>

            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero-section section-padding">
        <div class="container">
            <div class="hero-wrapper">
                <!-- content -->
                <div class="hero-content">
                    <h1>Timeless Love, <br> Artfully Captured.</h1>
                    <p>We craft cinematic and deeply emotional wedding stories. Modern aesthetic photography for couples
                        who value authentic moments and elegant editorial style.</p>
                    <button>Inquire Now</button>
                </div>

                <!-- images -->
                <div class="bento-grid">
                    <div class="image-wrapper">
                        <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?q=80&w=800&auto=format&fit=crop" alt="Weedding Decorated table">
                    </div>
                    <div class="image-wrapper">
                        <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=400&auto=format&fit=crop" alt="Red Ballons Flying on Weedding vanue">
                    </div>
                    <div class="image-wrapper">
                        <img src="https://plus.unsplash.com/premium_photo-1690148812608-9942834931a1?q=80&w=1170&auto=format=crop" alt="Bride & Groom Couple photoshot">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script></script>
</body>

</html>
